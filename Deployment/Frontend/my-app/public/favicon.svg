<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0d1117"/>
  <!-- Cyan border -->
  <rect width="32" height="32" rx="6" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
  <!-- Candlestick chart lines -->
  <line x1="7" y1="22" x2="7" y2="10" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="5.5" y="14" width="3" height="5" rx="0.5" fill="#ff4757"/>
  <line x1="13" y1="20" x2="13" y2="8" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="11.5" y="11" width="3" height="6" rx="0.5" fill="#00c896"/>
  <line x1="19" y1="18" x2="19" y2="9" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="17.5" y="12" width="3" height="4" rx="0.5" fill="#00c896"/>
  <line x1="25" y1="16" x2="25" y2="7" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="23.5" y="9" width="3" height="5" rx="0.5" fill="#ff4757"/>
  <!-- Trend line -->
  <polyline points="7,18 13,14 19,13 25,10" fill="none" stroke="#00d4ff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom label -->
  <text x="16" y="30" font-family="monospace" font-size="5" font-weight="700" fill="#00d4ff" text-anchor="middle" letter-spacing="0.5">FX</text>
</svg>
